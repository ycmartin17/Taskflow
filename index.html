<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<header>
    <nav class="navbar">
        <h2>TaskFlow</h2>

        <ul>
            <li><a href="landing.html">Home</a></li>
            <li><a href="register.html">Register</a></li>
            <li><a href="login.html">Login</a></li>
            <li><a href="index.html">Dashboard</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>
</header>

<main class="dashboard">

    <section class="dashboard-header">
        <h1>TaskFlow Dashboard</h1>
        <p>Create, organize, and track your tasks easily.</p>
    </section>

    <section class="task-form-box">
        <h2>Add New Task</h2>

        <form id="taskForm">
            <div class="input-group">
                <label>Title</label>
                <input type="text" id="title" placeholder="Enter task title" required>
            </div>

            <div class="input-group">
                <label>Description</label>
                <textarea id="description" placeholder="Enter description" required></textarea>
            </div>

            <div class="input-group">
                <label>Priority</label>
                <select id="priority">
                    <option value="low">Low</option>
                    <option value="medium">Medium</option>
                    <option value="high">High</option>
                </select>
            </div>

            <div class="input-group">
                <label>Status</label>
                <select id="status">
                    <option value="pending">Pending</option>
                    <option value="done">Done</option>
                </select>
            </div>

            <div class="input-group">
                <label>Due Date</label>
                <input type="date" id="dueDate" required>
            </div>

            <button type="submit" class="btn">Add Task</button>
        </form>
    </section>

    <section class="task-list-section">
        <h2>My Tasks</h2>
        <div id="taskList" class="task-list"></div>
    </section>

</main>
